# Figure 2 configuration for rnn256d run
# Usage: uv run python run.py --config-name=rnn256d

defaults:
  - base

# CEV line opacity
cev_alpha: 0.2

# Step filtering for plots
cev_max_step: 30000
dims_max_step: 30000

# Force recompute (bypass stale cache)
use_cache: true

# MLflow run settings
run_id: "<run-id>"  # repro_rnn_256d
experiment_id: "<experiment-id>"

# Layer selection (RNN layers: rnn.0.hidden, rnn.1.hidden)
layer: "rnn.1.hidden"

# Output paths
output_path: ../final_figures/figure_2_rnn256d.png
supplemental_path: ../final_figures/figure_2_rnn256d_supplemental.png
vertical_path: ../final_figures/figure_2_rnn256d_vertical.png
