# Figure 2 configuration for LSTM 32d run
# Usage: uv run python run_parallel.py --config-name=lstm32

defaults:
  - base

# CEV line opacity
cev_alpha: 0.2

# MLflow run settings
run_id: "<run-id>"  # repro_lstm_32d
experiment_id: "<experiment-id>"

# Layer selection (LSTM layers: rnn.0.hidden, rnn.1.hidden)
layer: "rnn.1.hidden"

# Output paths
output_path: ../final_figures/figure_2_lstm32.png
supplemental_path: ../final_figures/figure_2_lstm32_supplemental.png
vertical_path: ../final_figures/figure_2_lstm32_vertical.png
