# Figure 2 configuration for nctx_33 run
# Usage: uv run python run.py --config-name=nctx_33

defaults:
  - base

# CEV line opacity
cev_alpha: 0.2

# Step filtering for plots
cev_max_step: 10000
dims_max_step: 10000

# Force recompute (bypass stale cache)
use_cache: true

# MLflow run settings
run_id: "<run-id>"  # repro_transformer_nctx33
experiment_id: "<experiment-id>"


# Output paths
output_path: ../final_figures/figure_2_nctx_33.png
supplemental_path: ../final_figures/figure_2_nctx_33_supplemental.png
vertical_path: ../final_figures/figure_2_nctx_33_vertical.png
