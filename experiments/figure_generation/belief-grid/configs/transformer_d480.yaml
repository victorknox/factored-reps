# Figure 2 configuration for transformer_d480 run
# Usage: uv run python run.py --config-name=transformer_d480

defaults:
  - base

# CEV line opacity
cev_alpha: 0.2

# Step filtering for plots
cev_max_step: 10000
dims_max_step: 10000

# Force recompute (bypass stale cache)
use_cache: true

# MLflow run settings
run_id: "<run-id>"  # repro_transformer_d480
experiment_id: "<experiment-id>"

# Context length override (model has nctx=8)
max_prefix_length: 8

# Output paths
output_path: ../final_figures/figure_2_transformer_d480.png
supplemental_path: ../final_figures/figure_2_transformer_d480_supplemental.png
vertical_path: ../final_figures/figure_2_transformer_d480_vertical.png
