# Figure 2 configuration for nctx_101 run
# Usage: uv run python run.py --config-name=nctx_101

defaults:
  - base

# CEV line opacity
cev_alpha: 0.2

# Step filtering for plots
cev_max_step: 10000
dims_max_step: 10000

# MLflow run settings
run_id: "<run-id>"  # repro_transformer_nctx101
experiment_id: "<experiment-id>"

# Use default batch size (1000) from base config
use_cache: true

# Output paths
output_path: ../final_figures/figure_2_nctx_101.png
supplemental_path: ../final_figures/figure_2_nctx_101_supplemental.png
vertical_path: ../final_figures/figure_2_nctx_101_vertical.png
