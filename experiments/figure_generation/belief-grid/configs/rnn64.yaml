# Figure 2 configuration for RNN 64d run
# Usage: uv run python run_parallel.py --config-name=rnn64

defaults:
  - base

# CEV line opacity
cev_alpha: 0.2

# MLflow run settings
run_id: "<run-id>"  # repro_rnn_64d
experiment_id: "<experiment-id>"

# Layer selection (RNN layers: rnn.0.hidden, rnn.1.hidden)
layer: "rnn.1.hidden"

# Step filtering for plots (extend to 30k)
cev_max_step: 30000
dims_max_step: 30000

# Disable cache to force recomputation with new step range
use_cache: false

# Output paths
output_path: ../final_figures/figure_2_rnn64.png
supplemental_path: ../final_figures/figure_2_rnn64_supplemental.png
vertical_path: ../final_figures/figure_2_rnn64_vertical.png
