name: full_metric_tracker
instance:
  _target_: fwh_core.metrics.metric_tracker.MetricTracker
  metric_names:
    cheap:
      - learning_rate
      - tokens
      - learning_rate_weighted_tokens
      - loss
    expensive:
      - gradient_weighted_tokens
      - parameter_update
      - parameter_norm
      - parameter_distance
  metric_kwargs:
    ma_window_size: 100 # Function of number of sequences seen so far?
    ema_gamma: 0.9 # Find some opinions