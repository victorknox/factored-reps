    # Factor 0: Root (unconditional, 1 variant)
    - component_type: hmm
      variants:
        - process_name: mess3
          process_params:
            x: 0.15
            a: 0.6

    # Factor 1: Depends on Factor 0 (3 tokens -> 3 variants)
    - component_type: hmm
      variants:
        - process_name: mess3
          process_params:
            x: 0.15
            a: 0.6
        - process_name: mess3
          process_params:
            x: 0.11
            a: 0.79
        - process_name: mess3
          process_params:
            x: 0.5
            a: 0.6
      control_map: [0, 1, 2]

    # Factor 2: Depends on Factor 1 (3 tokens -> 3 variants)
    - component_type: hmm
      variants:
        - process_name: mess3
          process_params:
            x: 0.15
            a: 0.6
        - process_name: mess3
          process_params:
            x: 0.11
            a: 0.79
        - process_name: mess3
          process_params:
            x: 0.5
            a: 0.6
      control_map: [0, 1, 2]

    # Factor 3: Depends on Factor 2 (3 tokens -> 3 variants)
    - component_type: ghmm
      variants:
        - process_name: tom_quantum
          process_params:
            alpha: 1.0
            beta: 2.5
        - process_name: tom_quantum
          process_params:
            alpha: 1.0
            beta: 3.0
        - process_name: tom_quantum
          process_params:
            alpha: 1.0
            beta: 3.5
      control_map: [0, 1, 2]

    # Factor 4: Depends on Factor 3 (4 tokens -> 4 variants)
    - component_type: ghmm
      variants:
        - process_name: tom_quantum
          process_params:
            alpha: 1.0
            beta: 2.0
        - process_name: tom_quantum
          process_params:
            alpha: 1.0
            beta: 2.5
        - process_name: tom_quantum
          process_params:
            alpha: 1.0
            beta: 3.0
        - process_name: tom_quantum
          process_params:
            alpha: 1.0
            beta: 3.5
      control_map: [0, 1, 2, 3]

  device: ${device}

