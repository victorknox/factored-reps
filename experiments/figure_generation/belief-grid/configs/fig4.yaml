# Figure 4 Final configuration (conditional structure)
# Usage: uv run python run_parallel.py --config-name=fig4_final

defaults:
  - base

# CEV line opacity
cev_alpha: 0.2

# MLflow run settings
run_id: "<run-id>"  # repro_chain
experiment_id: "<experiment-id>"

# Layer selection (4-layer model: L3.resid.post is last)
layer: "L3.resid.post"

# Context length (nctx=8)
max_prefix_length: 8

# Output paths
output_path: ../final_figures/figure_4_final.png
supplemental_path: ../final_figures/figure_4_final_supplemental.png
vertical_path: ../final_figures/figure_4_final_vertical.png
