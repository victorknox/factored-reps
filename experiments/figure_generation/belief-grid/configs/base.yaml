# Base configuration for belief-grid figure generation
# This file contains all shared settings; figure-specific configs inherit from this.

# MLflow tracking settings - update for your environment
tracking_uri: "${oc.env:MLFLOW_TRACKING_URI,local}"
registry_uri: "${oc.env:MLFLOW_REGISTRY_URI,local}"

# Layer selection
layer: "L3.resid.post"

# Ground truth reference line
gt_dims95: 10

# Step filtering for plots
cev_max_step: 5000
dims_max_step: 5000
rmse_max_step: 5000
log_scale: true

# Metric keys
loss_metric_key: loss/step

# Checkpoint selection for belief regression
checkpoint_step: null

# CEV recomputation
recompute_cev: true
cev_n_checkpoints: 1000
cev_batch_size: 1000

# dims@95 recomputation
recompute_dims95: true
dims95_n_checkpoints: 1000

# RMSE recomputation
recompute_rmse: true
rmse_n_checkpoints: 20

# BOS token handling
skip_bos: true

# Prefix length filtering
max_prefix_length: 10

# CEV plot settings
cev_alpha: 0.2

# Simplex colormap settings (barycentric blending)
cmap: magma
cmap_start: 0.0
cmap_mid: 0.5
cmap_end: 0.9

# Output settings
output_format: png
dpi: 150
figsize:
  - 6.75
  - 4.0
supplemental_figsize:
  - 6.75
  - 2.5

# Caching
use_cache: true
cache_dir: .cache
