# Figure 2 configuration for RNN 32d run
# Usage: uv run python run_parallel.py --config-name=rnn32

defaults:
  - base

# CEV line opacity
cev_alpha: 0.2

# MLflow run settings
run_id: "<run-id>"  # repro_rnn_32d
experiment_id: "<experiment-id>"

# Layer selection (RNN layers: rnn.0.hidden, rnn.1.hidden)
layer: "rnn.1.hidden"


# Output paths
output_path: ../final_figures/figure_2_rnn32.png
supplemental_path: ../final_figures/figure_2_rnn32_supplemental.png
vertical_path: ../final_figures/figure_2_rnn32_vertical.png
